name = "chair-buddy"
compatibility_date = "2024-12-01"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"

# Custom domain — Cloudflare auto-creates the DNS record and SSL cert
# when this is deployed. Requires chairbuddy.com.au to be an active zone
# in the same Cloudflare account (it is).
[[routes]]
pattern = "app.chairbuddy.com.au"
custom_domain = true
